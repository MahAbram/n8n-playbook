<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 290" role="img" width="680" height="290" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Workflow architecture diagram</title>
  <desc>A left-to-right flow showing You, the Trigger, the Workflow as a composite box containing three nodes, and Connected Apps. A return path labeled Executions log feeds back to You.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
      .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
      .label-primary { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .label-secondary { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .label-teal { font-size: 12px; font-weight: 400; fill: #04342C; }
      .arrow-line { stroke: #5F5E5A; stroke-width: 1; fill: none; }
      .arrow-teal { stroke: #0F6E56; stroke-width: 1; fill: none; }
      .return-path { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 4; fill: none; }
      @media (prefers-color-scheme: dark) {
        .box-gray { fill: #2C2C2A; stroke: #B4B2A9; }
        .box-teal { fill: #085041; stroke: #5DCAA5; }
        .label-primary { fill: #F1EFE8; }
        .label-secondary { fill: #B4B2A9; }
        .label-teal { fill: #9FE1CB; }
        .arrow-line { stroke: #B4B2A9; }
        .arrow-teal { stroke: #5DCAA5; }
        .return-path { stroke: #888780; }
      }
    </style>
  </defs>

  <!-- You -->
  <rect class="box-gray" x="40" y="80" width="80" height="70" rx="8" stroke-width="0.5"/>
  <text class="label-primary" x="80" y="110" text-anchor="middle" dominant-baseline="central">You</text>
  <text class="label-secondary" x="80" y="130" text-anchor="middle" dominant-baseline="central">Build, watch</text>

  <!-- Trigger -->
  <rect class="box-gray" x="140" y="80" width="100" height="70" rx="8" stroke-width="0.5"/>
  <text class="label-primary" x="190" y="105" text-anchor="middle" dominant-baseline="central">Trigger</text>
  <text class="label-secondary" x="190" y="125" text-anchor="middle" dominant-baseline="central">Schedule,</text>
  <text class="label-secondary" x="190" y="140" text-anchor="middle" dominant-baseline="central">webhook, event</text>

  <!-- Workflow (composite) -->
  <rect class="box-gray" x="260" y="65" width="240" height="100" rx="10" stroke-width="0.5"/>
  <text class="label-primary" x="380" y="85" text-anchor="middle" dominant-baseline="central">Workflow</text>

  <!-- Nodes inside workflow -->
  <rect class="box-teal" x="278" y="105" width="60" height="40" rx="6" stroke-width="0.5"/>
  <text class="label-teal" x="308" y="125" text-anchor="middle" dominant-baseline="central">Node</text>
  <rect class="box-teal" x="350" y="105" width="60" height="40" rx="6" stroke-width="0.5"/>
  <text class="label-teal" x="380" y="125" text-anchor="middle" dominant-baseline="central">Node</text>
  <rect class="box-teal" x="422" y="105" width="60" height="40" rx="6" stroke-width="0.5"/>
  <text class="label-teal" x="452" y="125" text-anchor="middle" dominant-baseline="central">Node</text>

  <!-- Node-to-node connectors inside workflow -->
  <line class="arrow-teal" x1="338" y1="125" x2="350" y2="125" marker-end="url(#arrow)"/>
  <line class="arrow-teal" x1="410" y1="125" x2="422" y2="125" marker-end="url(#arrow)"/>

  <!-- Connected apps -->
  <rect class="box-gray" x="520" y="80" width="120" height="70" rx="8" stroke-width="0.5"/>
  <text class="label-primary" x="580" y="105" text-anchor="middle" dominant-baseline="central">Connected apps</text>
  <text class="label-secondary" x="580" y="125" text-anchor="middle" dominant-baseline="central">Gmail, Slack,</text>
  <text class="label-secondary" x="580" y="140" text-anchor="middle" dominant-baseline="central">CRM, sheets, API</text>

  <!-- Main flow arrows with items labels -->
  <line class="arrow-line" x1="120" y1="115" x2="140" y2="115" marker-end="url(#arrow)"/>
  <text class="label-secondary" x="130" y="105" text-anchor="middle">items</text>

  <line class="arrow-line" x1="240" y1="115" x2="278" y2="125" marker-end="url(#arrow)"/>
  <line class="arrow-line" x1="482" y1="125" x2="520" y2="115" marker-end="url(#arrow)"/>
  <text class="label-secondary" x="510" y="105" text-anchor="middle">items</text>

  <!-- Executions log return path -->
  <path class="return-path" d="M580 150 L580 220 L80 220 L80 150" marker-end="url(#arrow)"/>
  <text class="label-secondary" x="330" y="240" text-anchor="middle">Executions log: every run, every step, every result</text>
</svg>
